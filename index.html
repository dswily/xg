<body>
<div id="app"></div>

<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;
    
    // 全局数据
    const store = {
        habits: ref([]),
        dailyRecords: ref({}),
        starHistory: ref([]),
        totalSpentStars: ref(0),
        rewards: ref([]),
        ownedRewards: ref([]),
        childName: ref("小公主"),
        pageTitle: ref("习惯魔法城堡"),
        dailyGoal: ref(3),
        rewardHistory: ref([]),
        toastMsg: ref(""),
        effects: ref([]),
        
        getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        },
        getTotalCompletedCount() {
            // 计算所有获得的星星
            const gained = this.starHistory.value.filter(item => item.type === 'gain').reduce((total, item) => total + item.amount, 0);
            // 计算所有失去的星星（不包括兑换礼物）
            const lost = this.starHistory.value.filter(item => 
                item.type === 'lose' && !item.reason.includes('兑换礼物')
            ).reduce((total, item) => total + item.amount, 0);
            return gained - lost;
        },
        getTotalSpentStars() {
            return this.starHistory.value.filter(item => 
                item.type === 'lose' && item.reason.includes('兑换礼物')
            ).reduce((total, item) => total + item.amount, 0);
        },
        totalStars: computed(() => store.getTotalCompletedCount() - store.getTotalSpentStars()),
        calcStreak() {
            let today = this.getTodayStr();
            let streak = 0;
            let check = new Date();
            while (true) {
                let y = check.getFullYear();
                let m = String(check.getMonth()+1).padStart(2,'0');
                let d = String(check.getDate()).padStart(2,'0');
                let cur = `${y}-${m}-${d}`;
                let dayData = this.dailyRecords.value[cur] || {};
                let completedAny = Object.values(dayData).some(v => v === true);
                if (completedAny) {
                    streak++;
                    check.setDate(check.getDate() - 1);
                } else {
                    if (cur === today) break;
                    else break;
                }
                if (streak > 1000) break;
            }
            return streak;
        },
        getDayCompletedCount(dateStr) {
            let day = this.dailyRecords.value[dateStr] || {};
            return Object.values(day).filter(v => v === true).length;
        },
        // base64编码处理（支持UTF-8）
        utf8ToBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        },
        
        base64ToUtf8(str) {
            return decodeURIComponent(escape(atob(str)));
        },
        
        // GitHub数据存储相关
        get githubRepoOwner() {
            return localStorage.getItem('githubRepoOwner') || 'your-github-username';
        },
        set githubRepoOwner(value) {
            localStorage.setItem('githubRepoOwner', value);
        },
        get githubRepoName() {
            return localStorage.getItem('githubRepoName') || 'your-repo-name';
        },
        set githubRepoName(value) {
            localStorage.setItem('githubRepoName', value);
        },
        get githubToken() {
            return localStorage.getItem('githubToken') || '';
        },
        set githubToken(value) {
            localStorage.setItem('githubToken', value);
        },
        githubDataPath: 'data.json',
        
        // 保存所有数据
        async saveAll() {
            try {
                // 先保存到localStorage作为备份
                this.saveToLocalStorage();
                
                // 再尝试保存到GitHub
                if (this.githubToken) {
                    try {
                        await this.saveToGitHub();
                    } catch (error) {
                        console.error('GitHub同步失败:', error);
                        // GitHub同步失败不影响本地保存
                        this.showToast('数据已保存到本地，GitHub同步失败: ' + error.message, 3000);
                    }
                } else {
                    console.log('GitHub Token未设置，仅保存到localStorage');
                    this.showToast('数据已保存到本地', 2500);
                }
            } catch (error) {
                console.error('保存数据失败:', error);
                this.showToast('数据保存失败: ' + error.message, 3000);
            }
        },
        
        // 加载所有数据
        async loadAll() {
            try {
                // 先尝试从GitHub加载数据
                if (this.githubToken) {
                    try {
                        await this.loadFromGitHub();
                    } catch (error) {
                        console.error('从GitHub加载数据失败:', error);
                        // GitHub加载失败，尝试从localStorage加载
                        this.showToast('从GitHub加载数据失败，尝试从本地加载: ' + error.message, 3000);
                        this.loadFromLocalStorage();
                    }
                } else {
                    // 没有GitHub Token，从localStorage加载
                    this.loadFromLocalStorage();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                this.showToast('数据加载失败，使用默认数据: ' + error.message, 3000);
                // 重置为默认数据
                this.resetToDefaultData();
            }
        },
        
        // 从GitHub加载数据
        async loadFromGitHub() {
            if (!this.githubToken) {
                console.log('GitHub Token未设置，使用localStorage');
                return Promise.reject('GitHub Token未设置');
            }
            
            try {

        // 保存到GitHub
        async saveToGitHub() {
            try {
                // 收集所有数据
                const allData = {
                    habits: this.habits.value,
                    rewards: this.rewards.value,
                    childName: this.childName.value,
                    pageTitle: this.pageTitle.value,
                    dailyGoal: this.dailyGoal.value,
                    dailyRecords: this.dailyRecords.value,
                    starHistory: this.starHistory.value,
                    ownedRewards: this.ownedRewards.value,
                    totalSpentStars: this.totalSpentStars.value,
                    rewardHistory: this.rewardHistory.value
                };
                
                // 检查配置是否完整
                if (!this.githubRepoOwner || !this.githubRepoName || !this.githubToken) {
                    throw new Error('GitHub配置不完整');
                }
                
                // 获取当前文件的sha值
                const url = `https://api.github.com/repos/${this.githubRepoOwner}/${this.githubRepoName}/contents/${this.githubDataPath}`;
                let sha = '';
                
                try {
                    const response = await fetch(url, {
                        headers: {
                            'Authorization': `token ${this.githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        sha = data.sha;
                        console.log('找到现有文件，使用sha:', sha);
                    } else if (response.status === 404) {
                        console.log('文件不存在，将创建新文件');
                    } else {
                        throw new Error(`GitHub API请求失败: ${response.status} ${response.statusText}`);
                    }
                } catch (error) {
                    console.error('获取文件信息失败:', error);
                    // 继续执行，尝试创建文件
                }
                
                // 更新或创建文件
                const updateResponse = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${this.githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: '更新习惯追踪数据',
                        content: this.utf8ToBase64(JSON.stringify(allData, null, 2)),
                        sha: sha
                    })
                });
                
                if (!updateResponse.ok) {
                    const errorData = await updateResponse.json().catch(() => ({}));
                    throw new Error(`GitHub API更新失败: ${updateResponse.status} ${updateResponse.statusText}\n${errorData.message || ''}`);
                }
                
                console.log('保存到GitHub成功');
                this.showToast('数据已同步到云端', 2500);
            } catch (error) {
                console.error('保存到GitHub失败:', error);
                this.showToast(`保存到GitHub失败: ${error.message}`, 3000);
                throw error;
            }
        },
        
        // 保存到localStorage
        saveToLocalStorage() {
            try {
                localStorage.setItem('habits', JSON.stringify(this.habits.value));
                localStorage.setItem('dailyRecords', JSON.stringify(this.dailyRecords.value));
                localStorage.setItem('starHistory', JSON.stringify(this.starHistory.value));
                localStorage.setItem('totalSpentStars', this.totalSpentStars.value);
                localStorage.setItem('rewards', JSON.stringify(this.rewards.value));
                localStorage.setItem('ownedRewards', JSON.stringify(this.ownedRewards.value));
                localStorage.setItem('childName', this.childName.value);
                localStorage.setItem('pageTitle', this.pageTitle.value);
                localStorage.setItem('dailyGoal', this.dailyGoal.value);
                localStorage.setItem('rewardHistory', JSON.stringify(this.rewardHistory.value));
                console.log('保存到localStorage成功');
            } catch (error) {
                console.error('保存到localStorage失败:', error);
                throw error;
            }
        },
        showToast(msg, duration=3000) {
            this.toastMsg.value = msg;
            setTimeout(() => { this.toastMsg.value = ""; }, duration);
        },
        addEffect(x, y, emoji = "⭐") {
            this.effects.value.push({ x, y, emoji });
            setTimeout(() => { this.effects.value.shift(); }, 600);
        }
    };

                    </div>

        `,
        setup() {
            const habits = store.habits;
            const dailyRecords = store.dailyRecords;
            const dailyGoal = store.dailyGoal;
            const totalStars = store.totalStars;
            const streakDays = computed(() => store.calcStreak());
            const todayStr = store.getTodayStr();
            const todayCompletedCount = computed(() => {
                const day = dailyRecords.value[todayStr] || {};
                return Object.values(day).filter(v => v === true).length;
            });
            const progressPercent = computed(() => {
                let percent = (todayCompletedCount.value / dailyGoal.value) * 100;
                return Math.min(percent, 100);
            });
            const progressClass = computed(() => {
                let completed = todayCompletedCount.value;
                let goal = dailyGoal.value;
                if (completed > goal) return 'over';
                if (completed === goal) return 'meet';
                if (completed === goal - 1) return 'near';
                return 'under';
            });
            const refreshKey = ref(0);
            // 星星显示：只显示当天获得的星星数量，最多显示30个，超出部分用 +N 显示
            const todayStarCount = computed(() => {
                refreshKey.value;
                const today = store.getTodayStr();
                const history = localStorage.getItem('starHistory');
                if (history) {
                    const starHistory = JSON.parse(history);
                    const todayGainedStars = starHistory.filter(item => 
                        item.date === today && item.type === 'gain'
                    ).reduce((total, item) => total + item.amount, 0);
                    const todayLostStars = starHistory.filter(item => 
                        item.date === today && 
                        item.type === 'lose' && 
                        (item.reason.includes('取消习惯') || item.reason.includes('额外奖励取消'))
                    ).reduce((total, item) => total + item.amount, 0);
                    const todayStars = Math.max(0, todayGainedStars - todayLostStars);
                    return Math.min(todayStars, 30);
                }
                return 0;
            });
            const todayExtraStars = computed(() => {
                refreshKey.value;
                const today = store.getTodayStr();
                const history = localStorage.getItem('starHistory');
                if (history) {
                    const starHistory = JSON.parse(history);
                    const todayGainedStars = starHistory.filter(item => 
                        item.date === today && item.type === 'gain'
                    ).reduce((total, item) => total + item.amount, 0);
                    const todayLostStars = starHistory.filter(item => 
                        item.date === today && 
                        item.type === 'lose' && 
                        (item.reason.includes('取消习惯') || item.reason.includes('额外奖励取消'))
                    ).reduce((total, item) => total + item.amount, 0);
                    const todayStars = Math.max(0, todayGainedStars - todayLostStars);
                    return Math.max(0, todayStars - 30);
                }
                return 0;
            });
            
            const isCompleted = (habitId) => {
                return (dailyRecords.value[todayStr]?.[habitId] === true);
            };
            
            const hasTodayExtraBonus = () => {
                const today = store.getTodayStr();
                const todayItems = store.starHistory.value.filter(item => item.date === today);
                
                // 计算当天获得的额外奖励数量
                const gainedBonus = todayItems.filter(item => 
                    item.type === 'gain' && item.reason === '超出目标额外奖励'
                ).reduce((total, item) => total + item.amount, 0);
                
                // 计算当天取消的额外奖励数量
                const lostBonus = todayItems.filter(item => 
                    item.type === 'lose' && item.reason === '取消后未超出目标，额外奖励取消'
                ).reduce((total, item) => total + item.amount, 0);
                
                // 如果获得的比取消的多，说明当天还有额外奖励
                return gainedBonus > lostBonus;
            };
            
            const removeTodayExtraBonus = (starHistory) => {
                const today = store.getTodayStr();
                return starHistory.filter(item => 
                    !(item.date === today && 
                    item.type === 'gain' && 
                    item.reason === '超出目标额外奖励')
                );
            };
            
            const toggleHabit = (habitId) => {
                const habit = habits.value.find(h => h.id === habitId);
                const habitName = habit ? habit.name : "习惯";
                const today = store.getTodayStr();
                if (!dailyRecords.value[today]) dailyRecords.value[today] = {};
                const newVal = !dailyRecords.value[today][habitId];
                
                dailyRecords.value[today][habitId] = newVal;
                store.dailyRecords.value = { ...store.dailyRecords.value };
                
                const history = localStorage.getItem('starHistory');
                let starHistory = history ? JSON.parse(history) : [];
                
                if (newVal) {
                    const completedCount = Object.values(dailyRecords.value[today]).filter(v => v === true).length;
                    
                    if (completedCount > dailyGoal.value && !hasTodayExtraBonus()) {
                        store.showToast(`🎊 超级厉害！超出目标，额外+1星星 🎊`, 3000);
                        const x = window.innerWidth / 2;
                        const y = window.innerHeight - 100;
                        store.addEffect(x, y, "⭐");
                        store.addEffect(x+20, y-30, "✨");
                        store.addEffect(x-20, y-30, "✨");
                        store.addEffect(x, y-60, "🎊");
                        
                        starHistory.unshift({
                            id: Date.now() + '_' + Math.random(),
                            date: today,
                            type: 'gain',
                            amount: 1,
                            reason: `完成习惯：${habitName}`
                        });
                        
                        starHistory.unshift({
                            id: Date.now() + '_' + Math.random(),
                            date: today,
                            type: 'gain',
                            amount: 1,
                            reason: `超出目标额外奖励`
                        });
                    } else {
                        store.showToast(`🎉 太棒啦！ +1星星 🎉`, 3000);
                        const x = window.innerWidth / 2;
                        const y = window.innerHeight - 100;
                        store.addEffect(x, y, "⭐");
                        store.addEffect(x+20, y-30, "✨");
                        
                        starHistory.unshift({
                            id: Date.now() + '_' + Math.random(),
                            date: today,
                            type: 'gain',
                            amount: 1,
                            reason: `完成习惯：${habitName}`
                        });
                    }
                } else {
                    store.showToast("💪 取消打卡，星星-1", 3000);
                    
                    starHistory.unshift({
                        id: Date.now() + '_' + Math.random(),
                        date: today,
                        type: 'lose',
                        amount: 1,
                        reason: `取消习惯：${habitName}`
                    });
                    
                    const completedCountAfter = Object.values(dailyRecords.value[today]).filter(v => v === true).length;
                    if (completedCountAfter <= dailyGoal.value && hasTodayExtraBonus()) {
                        starHistory.unshift({
                            id: Date.now() + '_' + Math.random(),
                            date: today,
                            type: 'lose',
                            amount: 1,
                            reason: `取消后未超出目标，额外奖励取消`
                        });
                        store.showToast("⭐ 未达到目标，额外奖励已取消", 3000);
                    }
                }
                
                localStorage.setItem('starHistory', JSON.stringify(starHistory));
                store.starHistory.value = starHistory;
                store.saveAll();
                
                store.totalStars.value = store.getTotalCompletedCount() - store.getTotalSpentStars();
                refreshKey.value++;
            };
            return { habits, dailyGoal, totalStars, todayCompletedCount, isCompleted, toggleHabit, streakDays, progressPercent, progressClass, todayStarCount, todayExtraStars, refreshKey };
        }
    };

                            <!-- 打卡次数成就 -->
                            <div class="achievement-card" style="background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border: 1px solid #2196f3; border-radius: 10px; padding: 12px; text-align: center; transform: rotate(0.5deg); box-shadow: 3px 3px 8px rgba(0,0,0,0.1);">
                                <div style="font-size: 1.5rem; margin-bottom: 8px;">✅</div>
                                <h4 style="margin: 0 0 4px 0; color: #1565c0; font-size: 1rem;">习惯养成大师</h4>
                                <p style="margin: 0; color: #666; font-size: 0.9rem;">完成 <strong>{{ totalCompletedHabits }}</strong> 次打卡</p>

                            <!-- 单日最高成就 -->
                            <div class="achievement-card" style="background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); border: 1px solid #9c27b0; border-radius: 8px 12px 8px 12px; padding: 12px; text-align: center; transform: rotate(-1.5deg); box-shadow: 3px 3px 8px rgba(0,0,0,0.1);">
                                <div style="font-size: 1.5rem; margin-bottom: 8px;">💪</div>
                                <h4 style="margin: 0 0 4px 0; color: #6a0080; font-size: 1rem;">爆发力惊人</h4>
                                <p style="margin: 0; color: #666; font-size: 0.9rem;">单日最高 <strong>{{ maxHabits }}</strong> 个习惯</p>
                            </div>
                        </div>
                        
                        <!-- 成长建议单独一行 -->
                        <div style="padding: 0 15px 15px 15px;">
                            <div class="achievement-card" style="background: linear-gradient(135deg, #fffde7 0%, #fff9c4 100%); border: 1px solid #ffeb3b; border-radius: 12px 10px 12px 10px; padding: 12px; text-align: center; box-shadow: 3px 3px 8px rgba(0,0,0,0.1);">
                                <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px;">
                                    <span style="font-size: 1.5rem;">{{ adviceIcon }}</span>
                                    <h4 style="margin: 0; color: #f57f17; font-size: 1rem;">成长建议</h4>
                                </div>
                                <p style="margin: 0; color: #666; font-size: 0.9rem;">{{ adviceText }}</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 星星历史记录 -->
                <div class="card" style="margin-top: 16px; border: 2px solid #e8d6ff;">
                    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" @click="toggleHistory">
                        <h3><i class="fas fa-history"></i> 星星历史记录</h3>
                        <i :class="{ 'fas fa-chevron-down': showHistory, 'fas fa-chevron-up': !showHistory }"></i>
                    </div>
                    <div v-if="showHistory">
                        <div v-if="starHistory.length === 0" style="text-align: center; color: #b45a7a; padding: 20px;">
                            暂无历史记录
                        </div>
                        <div v-else>
                            <div v-for="(items, date) in groupedHistory" :key="date" style="margin-bottom: 16px;">
                                <div style="font-weight: bold; color: #b45a7a; margin-bottom: 8px;">{{ date }}</div>
                                <div class="history-list">
                                    <div v-for="item in items" :key="item.id" class="history-item">
                                        <div class="history-content">
                                            <span v-if="item.type === 'gain'" style="color: #2c6e2c;">
                                                {{ item.reason }} +{{ item.amount }}
                                            </span>
                                            <span v-else style="color: #b45a7a;">
                                                {{ item.reason }} -{{ item.amount }}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `,
        setup() {
            const totalStars = store.totalStars;
            const streakDays = computed(() => store.calcStreak());
            const ownedRewards = store.ownedRewards;
            const showHistory = ref(false);
            const showStats = ref(true); // 默认展开统计功能
            const showAchievements = ref(true); // 默认展开成就功能
            const starHistory = ref([]);
            const groupedHistory = computed(() => {
                const grouped = {};
                starHistory.value.forEach(item => {
                    if (!grouped[item.date]) {
                        grouped[item.date] = [];
                    }
                    grouped[item.date].push(item);
                });
                return grouped;
            });
            
            // 统计功能相关
            const periods = ref([
                { key: 'week', label: '本周' },
                { key: 'month', label: '本月' },
                { key: 'quarter', label: '本季' },
                { key: 'year', label: '本年' }
            ]);
            const currentPeriod = ref('week');
            const customStart = ref('');
            const customEnd = ref('');
            let chart = null;
            const totalHabits = ref(0);
            const maxHabits = ref(0);
            const avgHabits = ref(0);
            const adviceText = ref("");
            const adviceIcon = ref("");
            const adviceColor = ref("");
            
            // 星星获得统计相关
            const showStarStats = ref(true); // 默认展开星星获得统计
            const currentStarPeriod = ref('week');
            const customStarStart = ref('');
            const customStarEnd = ref('');
            let starChart = null;
            
            const totalEarnedStars = computed(() => store.getTotalCompletedCount());
            
            const totalCompletedHabits = computed(() => {
                let total = 0;
                for (let date in store.dailyRecords.value) {
                    const day = store.dailyRecords.value[date];
                    for (let hid in day) if (day[hid] === true) total++;
                }
                return total;
            });
            
            // 统计兑换过的礼物总数
            const totalRedeemedRewards = computed(() => {
                return store.rewardHistory.value.filter(item => item.type === 'gain').length;
            });
            
            const extraBonusCount = computed(() => {
                const history = localStorage.getItem('starHistory');
                if (history) {
                    const starHistory = JSON.parse(history);
                    // 计算获得的额外奖励
                    const gainedBonus = starHistory.filter(item => 
                        item.type === 'gain' && (item.reason === '超出目标额外奖励' || item.reason.startsWith('额外奖励：'))
                    ).reduce((total, item) => total + item.amount, 0);
                    // 计算取消的额外奖励
                    const lostBonus = starHistory.filter(item => 
                        item.type === 'lose' && item.reason === '取消后未超出目标，额外奖励取消'
                    ).reduce((total, item) => total + item.amount, 0);
                    return gainedBonus - lostBonus;
                }
                return 0;
            });
            
            const totalSpentStars = computed(() => store.getTotalSpentStars());
            
            const loadStarHistory = () => {
                // 从localStorage加载历史记录
                const history = localStorage.getItem('starHistory');
                if (history) {
                    starHistory.value = JSON.parse(history);
                } else {
                    starHistory.value = [];
                }
            };
            
            const toggleHistory = () => {
                showHistory.value = !showHistory.value;
            };
            
            const toggleStats = () => {
                showStats.value = !showStats.value;
            };
            
            const toggleAchievements = () => {
                showAchievements.value = !showAchievements.value;
            };
            
            // 统计功能方法
            const getDateRange = () => {
                let start, end = new Date();
                if (currentPeriod.value === 'week') {
                    let today = new Date();
                    let day = today.getDay();
                    let diff = day === 0 ? 6 : day-1;
                    start = new Date(today);
                    start.setDate(today.getDate() - diff);
                } else if (currentPeriod.value === 'month') {
                    start = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
                } else if (currentPeriod.value === 'quarter') {
                    let now = new Date();
                    let quarter = Math.floor(now.getMonth() / 3);
                    start = new Date(now.getFullYear(), quarter*3, 1);
                } else if (currentPeriod.value === 'year') {
                    start = new Date(new Date().getFullYear(), 0, 1);
                } else if (currentPeriod.value === 'custom') {
                    // 即使没有选择日期，也返回默认值
                    if (customStart.value && customEnd.value) {
                        start = new Date(customStart.value);
                        end = new Date(customEnd.value);
                    } else {
                        // 默认显示最近7天
                        start = new Date();
                        start.setDate(start.getDate() - 6);
                        end = new Date();
                    }
                }
                if (!start) start = new Date();
                return { start, end };
            };
            
            const getDataForRange = () => {
                let { start, end } = getDateRange();
                let dates = [];
                let values = [];
                let cur = new Date(start);
                while (cur <= end) {
                    let y = cur.getFullYear();
                    let m = String(cur.getMonth()+1).padStart(2,'0');
                    let d = String(cur.getDate()).padStart(2,'0');
                    let str = `${y}-${m}-${d}`;
                    let count = store.getDayCompletedCount(str);
                    dates.push(`${m}/${d}`);
                    values.push(count);
                    cur.setDate(cur.getDate() + 1);
                }
                return { labels: dates, data: values };
            };
            
            const renderChart = () => {
                const ctx = document.getElementById('statsChart')?.getContext('2d');
                if (!ctx) return;
                const { labels, data } = getDataForRange();
                if (chart) chart.destroy();
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '完成习惯数',
                            data: data,
                            borderColor: '#ff8ab5',
                            backgroundColor: 'rgba(255,138,181,0.2)',
                            tension: 0.3,
                            fill: true,
                            pointBackgroundColor: '#ff6699'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1, // 设置y轴间隔为1
                                    precision: 0 // 确保显示整数
                                }
                            }
                        }
                    }
                });
                const total = data.reduce((a,b)=>a+b,0);
                const avg = (total/data.length).toFixed(1);
                const max = Math.max(...data);
                
                // 更新计算属性
                totalHabits.value = total;
                maxHabits.value = max;
                avgHabits.value = avg;
                
                // 设置建议文本和图标
                if (avg >= store.dailyGoal.value) {
                    adviceText.value = `太棒啦！你就像一个超级小英雄，超过了每日目标！`;
                    adviceIcon.value = "🎉";
                    adviceColor.value = "#2c6e2c";
                } else if (avg >= store.dailyGoal.value-1) {
                    adviceText.value = `好厉害！你就像一只努力的小蜜蜂，就快达到目标啦！`;
                    adviceIcon.value = "🌸";
                    adviceColor.value = "#b45a7a";
                } else {
                    adviceText.value = `加油哦！你就像一颗正在成长的小种子，每天多打卡一点点！`;
                    adviceIcon.value = "✨";
                    adviceColor.value = "#a55cff";
                }
            };
            
            const setPeriod = (p) => {
                currentPeriod.value = p;
                renderChart();
            };
            const toggleCustomPeriod = () => {
                currentPeriod.value = 'custom';
                renderChart();
            };
            const applyCustom = () => {
                // 无论是否选择日期，都应用自定义时间段
                currentPeriod.value = 'custom';
                renderChart();
                store.showToast("已应用自定义时间段", 2500);
            };
            
            // 星星获得统计相关方法
            const toggleStarStats = () => {
                showStarStats.value = !showStarStats.value;
                if (showStarStats.value) {
                    setTimeout(() => {
                        renderStarChart();
                    }, 100);
                }
            };
            const setStarPeriod = (p) => {
                currentStarPeriod.value = p;
                renderStarChart();
            };
            const toggleCustomStarPeriod = () => {
                currentStarPeriod.value = 'custom';
                renderStarChart();
            };
            const applyCustomStar = () => {
                currentStarPeriod.value = 'custom';
                renderStarChart();
                store.showToast("已应用自定义时间段", 2500);
            };
            
            // 获取星星获得统计的日期范围
            const getStarDateRange = () => {
                const today = store.getTodayStr();
                if (currentStarPeriod.value === 'week') {
                    const start = new Date();
                    start.setDate(start.getDate() - 6);
                    return { start, end: new Date() };
                } else if (currentStarPeriod.value === 'month') {
                    const start = new Date();
                    start.setMonth(start.getMonth() - 1);
                    return { start, end: new Date() };
                } else if (currentStarPeriod.value === 'quarter') {
                    const start = new Date();
                    start.setMonth(start.getMonth() - 3);
                    return { start, end: new Date() };
                } else if (currentStarPeriod.value === 'year') {
                    const start = new Date();
                    start.setFullYear(start.getFullYear() - 1);
                    return { start, end: new Date() };
                } else if (currentStarPeriod.value === 'custom') {
                    const start = customStarStart.value ? new Date(customStarStart.value) : new Date();
                    start.setDate(start.getDate() - 6);
                    const end = customStarEnd.value ? new Date(customStarEnd.value) : new Date();
                    return { start, end };
                }
            };
            
            // 获取星星获得统计的数据
            const getStarDataForRange = () => {
                let { start, end } = getStarDateRange();
                let dates = [];
                let values = [];
                let cur = new Date(start);
                while (cur <= end) {
                    let y = cur.getFullYear();
                    let m = String(cur.getMonth()+1).padStart(2,'0');
                    let d = String(cur.getDate()).padStart(2,'0');
                    let str = `${y}-${m}-${d}`;
                    // 计算当天获得的星星数量
                    const history = localStorage.getItem('starHistory');
                    let starCount = 0;
                    if (history) {
                        const starHistory = JSON.parse(history);
                        starCount = starHistory.filter(item => 
                            item.date === str && item.type === 'gain'
                        ).reduce((total, item) => total + item.amount, 0);
                    }
                    dates.push(`${m}/${d}`);
                    values.push(starCount);
                    cur.setDate(cur.getDate() + 1);
                }
                return { labels: dates, data: values };
            };
            
            // 渲染星星获得统计图表
            const renderStarChart = () => {
                const ctx = document.getElementById('starStatsChart')?.getContext('2d');
                if (!ctx) return;
                const { labels, data } = getStarDataForRange();
                if (starChart) starChart.destroy();
                starChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '获得星星数',
                            data: data,
                            borderColor: '#ffb347',
                            backgroundColor: 'rgba(255,179,71,0.2)',
                            tension: 0.3,
                            fill: true,
                            pointBackgroundColor: '#ff9900'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1, // 设置y轴间隔为1
                                    precision: 0 // 确保显示整数
                                }
                            }
                        }
                    }
                });
            };
            
            // 初始化
            loadStarHistory();
            onMounted(() => { 
                renderChart();
                setTimeout(() => {
                    renderStarChart();
                }, 100);
            });
            watch([currentPeriod, customStart, customEnd], () => { if (currentPeriod.value !== 'custom') renderChart(); });
            watch([currentStarPeriod, customStarStart, customStarEnd], () => { if (currentStarPeriod.value !== 'custom') renderStarChart(); });
            
            return {
                totalStars,
                streakDays,
                ownedRewards,
                showHistory,
                showStats,
                showAchievements,
                showStarStats,
                starHistory,
                groupedHistory,
                totalEarnedStars,
                totalCompletedHabits,
                totalRedeemedRewards,
                extraBonusCount,
                totalSpentStars,
                toggleHistory,
                toggleStats,
                toggleAchievements,
                toggleStarStats,
                // 统计功能相关
                periods,
                currentPeriod,
                customStart,
                customEnd,
                setPeriod,
                toggleCustomPeriod,
                applyCustom,
                // 星星获得统计相关
                currentStarPeriod,
                customStarStart,
                customStarEnd,
                setStarPeriod,
                toggleCustomStarPeriod,
                applyCustomStar,
                totalHabits,
                maxHabits,
                avgHabits,
                adviceText,
                adviceIcon,
                adviceColor
            };
        }
    };
    
    // 商店页
    const ShopPage = {
        template: `
            <div class="card">
                <h2><i class="fas fa-store"></i> 星光商店</h2>
                <div class="reward-grid">
                    <div v-for="reward in rewards" :key="reward.id" class="reward-card">
                        <div style="font-size: 2.5rem;">{{ reward.icon }}</div>
                        <div><strong>{{ reward.name }}</strong></div>
                        <div>⭐ {{ reward.cost }}</div>
                        <button class="btn" @click="buy(reward)">兑换</button>
                    </div>
                </div>
                <div v-if="ownedRewards.length" class="card" style="margin-top: 16px;">
                    <h3><i class="fas fa-gift"></i> 我的宝箱</h3>
                    <div style="display: flex; gap: 10px; flex-wrap:wrap;">
                        <div v-for="r in ownedRewards" :key="r.id" style="background:#ffe6f0; border-radius:40px; padding:6px 12px; display: flex; align-items: center; gap: 8px;">
                            <span>{{ r.icon }} {{ r.name }}</span>
                            <button class="btn" style="padding: 2px 8px; font-size: 0.8rem;" @click="useReward(r)">使用</button>
                        </div>
                    </div>
                </div>
                
                <!-- 礼物历史记录 -->
                <div class="card" style="margin-top: 16px; border: 2px solid #d6ffed;">
                    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" @click="toggleRewardHistory">
                        <h3><i class="fas fa-history"></i> 礼物历史记录</h3>
                        <i :class="{ 'fas fa-chevron-down': showRewardHistory, 'fas fa-chevron-up': !showRewardHistory }"></i>
                    </div>
                    <div v-if="showRewardHistory">
                        <div v-if="rewardHistory.length === 0" style="text-align: center; color: #b45a7a; padding: 20px;">
                            暂无礼物历史记录
                        </div>
                        <div v-else>
                            <div v-for="(items, date) in groupedRewardHistory" :key="date" style="margin-bottom: 16px;">
                                <div style="font-weight: bold; color: #b45a7a; margin-bottom: 8px;">{{ date }}</div>
                                <div class="history-list">
                                    <div v-for="item in items" :key="item.id" class="history-item">
                                        <div class="history-content">
                                            <span v-if="item.type === 'gain'" style="color: #2c6e2c;">
                                                获得 {{ item.reward.icon }} {{ item.reward.name }}
                                            </span>
                                            <span v-else style="color: #b45a7a;">
                                                使用 {{ item.reward.icon }} {{ item.reward.name }}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `,
        setup() {
            const rewards = store.rewards;
            const ownedRewards = store.ownedRewards;
            const totalStars = store.totalStars;
            const rewardHistory = ref([]);
            const showRewardHistory = ref(false);
            
            // 加载礼物历史记录
            const loadRewardHistory = () => {
                rewardHistory.value = store.rewardHistory.value;
            };
            
            // 按天分组礼物历史记录
            const groupedRewardHistory = computed(() => {
                const grouped = {};
                rewardHistory.value.forEach(item => {
                    if (!grouped[item.date]) {
                        grouped[item.date] = [];
                    }
                    grouped[item.date].push(item);
                });
                return grouped;
            });
            
            // 切换礼物历史记录显示
            const toggleRewardHistory = () => {
                showRewardHistory.value = !showRewardHistory.value;
            };
            
            // 初始化加载礼物历史记录
            loadRewardHistory();
            const buy = (reward) => {
                if (totalStars.value >= reward.cost) {
                    // 允许重复兑换同一个礼物
                    store.ownedRewards.value.push({ ...reward });
                    
                    // 添加兑换礼物的星星历史记录
                    const today = store.getTodayStr();
                    const starHistory = localStorage.getItem('starHistory');
                    const starHistoryData = starHistory ? JSON.parse(starHistory) : [];
                    
                    starHistoryData.unshift({
                        id: Date.now() + '_' + Math.random(),
                        date: today,
                        type: 'lose',
                        amount: reward.cost,
                        reason: `兑换礼物：${reward.name}`
                    });
                    
                    localStorage.setItem('starHistory', JSON.stringify(starHistoryData));
                    store.starHistory.value = starHistoryData;
                    
                    // 添加礼物获得的历史记录到礼物历史
                    store.rewardHistory.value.unshift({
                        id: Date.now() + '_' + Math.random(),
                        date: today,
                        type: 'gain',
                        reward: { ...reward }
                    });
                    store.saveAll();
                    
                    // 强制刷新数据
                    store.totalStars.value = store.getTotalCompletedCount() - store.getTotalSpentStars();
                    loadRewardHistory();
                    
                    store.showToast(`🎁 获得 ${reward.icon} ${reward.name}！好漂亮呀～`, 3000);
                } else {
                    store.showToast(`⭐ 星星不足，完成更多习惯吧～`, 3000);
                }
            };
            
            const useReward = (reward) => {
                if (confirm(`确定要使用 ${reward.icon} ${reward.name} 吗？使用后将从宝箱中移除。`)) {
                    const index = store.ownedRewards.value.findIndex(r => r.id === reward.id);
                    if (index !== -1) {

                    }
                }
            };

        setup() {

            const newHabitIcon = ref("🌸");
            const newRewardName = ref("");
            const newRewardCost = ref(5);
            const newRewardIcon = ref("🎁");

            const customAmount = ref(1);

            const showSync = ref(false); // 数据同步面板
            const showGithubConfig = ref(false); // GitHub配置面板
            
            // GitHub配置相关
            const githubOwner = ref(localStorage.getItem('githubRepoOwner') || '');
            const githubRepo = ref(localStorage.getItem('githubRepoName') || '');
            const githubToken = ref(localStorage.getItem('githubToken') || '');
            
            const saveBasic = () => { store.saveAll(); store.showToast("设置已保存~", 2500); };
            
            // GitHub配置相关方法
            const toggleGithubConfig = () => {
                showGithubConfig.value = !showGithubConfig.value;
            };
            
            const saveGithubConfig = () => {
                store.githubRepoOwner = githubOwner.value;
                store.githubRepoName = githubRepo.value;
                store.githubToken = githubToken.value;
                store.showToast('GitHub配置保存成功！', 2500);
            };
            
            // 测试GitHub配置
            const testGithubConfig = async () => {
                if (!githubOwner.value || !githubRepo.value || !githubToken.value) {
                    store.showToast('请先填写完整的GitHub配置', 2500);
                    return;
                }
                
                try {
                    store.showToast('正在测试GitHub配置...', 2500);
                    
                    // 测试仓库访问权限
                    const url = `https://api.github.com/repos/${githubOwner.value}/${githubRepo.value}`;
                    const response = await fetch(url, {
                        headers: {
                            'Authorization': `token ${githubToken.value}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`仓库访问失败: ${response.status} ${response.statusText}\n${errorData.message || ''}`);
                    }
                    
                    // 测试文件操作权限
                    const testContent = store.utf8ToBase64(JSON.stringify({ test: 'test' }));
                    const testUrl = `https://api.github.com/repos/${githubOwner.value}/${githubRepo.value}/contents/test-config.json`;
                    
                    // 检查文件是否存在，获取sha值
                    let sha = '';
                    try {
                        const checkResponse = await fetch(testUrl, {
                            headers: {
                                'Authorization': `token ${githubToken.value}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });
                        
                        if (checkResponse.ok) {
                            const checkData = await checkResponse.json();
                            sha = checkData.sha;
                            console.log('文件已存在，使用sha:', sha);
                        } else if (checkResponse.status === 404) {
                            console.log('文件不存在，将创建新文件');
                        } else {
                            throw new Error(`检查文件状态失败: ${checkResponse.status} ${checkResponse.statusText}`);
                        }
                    } catch (checkError) {
                        console.warn('检查文件状态时出错:', checkError);
                        // 继续执行，尝试创建文件
                    }
                    
                    const testResponse = await fetch(testUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken.value}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: '测试GitHub配置',
                            content: testContent,
                            sha: sha
                        })
                    });
                    
                    if (!testResponse.ok) {
                        const errorData = await testResponse.json().catch(() => ({}));
                        throw new Error(`文件操作失败: ${testResponse.status} ${testResponse.statusText}\n${errorData.message || ''}`);
                    }
                    
                    // 测试成功
                    store.showToast('GitHub配置测试成功！', 2500);
                } catch (error) {
                    console.error('GitHub配置测试失败:', error);
                    store.showToast(`测试失败: ${error.message}`, 3000);
                }
            };
            
            const addHabit = () => {
                if (!newHabitName.value.trim()) return store.showToast("请输入习惯名称", 2500);
                const newId = Date.now() + "_" + Math.random();
                habits.value.push({ id: newId, name: newHabitName.value.trim(), icon: newHabitIcon.value });
                const today = store.getTodayStr();
                if (!store.dailyRecords.value[today]) store.dailyRecords.value[today] = {};
                store.dailyRecords.value[today][newId] = false;
                store.saveAll();
                newHabitName.value = "";
                store.showToast("✨ 新习惯加入魔法清单", 2500);
            };
            const deleteHabit = (id) => {
                if (habits.value.length <= 1) return store.showToast("至少保留一个习惯哟", 2500);
                const habit = habits.value.find(h => h.id === id);
                const habitName = habit ? habit.name : "习惯";
                if (confirm(`确定要删除 ${habitName} 吗？`)) {
                    habits.value = habits.value.filter(h => h.id !== id);
                    for (let date in store.dailyRecords.value) delete store.dailyRecords.value[date][id];
                    store.saveAll();
                    store.showToast("已删除习惯", 1500);
                }
            };
            const addReward = () => {
                if (!newRewardName.value.trim()) return store.showToast("请输入礼物名称", 1500);
                const newId = Date.now() + "_r";
                rewards.value.push({ id: newId, name: newRewardName.value.trim(), icon: newRewardIcon.value, cost: newRewardCost.value || 5 });
                store.saveAll();
                newRewardName.value = "";
                newRewardCost.value = 5;
                store.showToast("🎁 新礼物上架啦", 1500);
            };
            const deleteReward = (id) => {
                const reward = rewards.value.find(r => r.id === id);
                const rewardName = reward ? reward.name : "礼物";
                if (confirm(`确定要删除 ${rewardName} 吗？`)) {
                    rewards.value = rewards.value.filter(r => r.id !== id);
                    store.saveAll();
                    store.showToast("已删除礼物", 1500);
                }
            };
            const resetData = () => {
                if (confirm("重置会清除所有打卡记录和星星，恢复默认习惯和礼物，确定吗？")) {
                    // 保存GitHub配置
                    const githubRepoOwner = localStorage.getItem('githubRepoOwner');
                    const githubRepoName = localStorage.getItem('githubRepoName');
                    const githubToken = localStorage.getItem('githubToken');
                    
                    // 清除所有数据
                    localStorage.clear();
                    
                    // 恢复GitHub配置
                    if (githubRepoOwner) localStorage.setItem('githubRepoOwner', githubRepoOwner);
                    if (githubRepoName) localStorage.setItem('githubRepoName', githubRepoName);
                    if (githubToken) localStorage.setItem('githubToken', githubToken);
                    
                    window.location.reload();
                }
            };
            
            // 数据同步相关方法
            const toggleSync = () => {
                showSync.value = !showSync.value;
            };
            
            const exportData = () => {
                // 收集所有数据
                const allData = {
                    habits: store.habits.value,
                    rewards: store.rewards.value,
                    childName: store.childName.value,
                    pageTitle: store.pageTitle.value,
                    dailyGoal: store.dailyGoal.value,
                    dailyRecords: store.dailyRecords.value,
                    starHistory: store.starHistory.value,
                    ownedRewards: store.ownedRewards.value,
                    totalSpentStars: store.totalSpentStars.value,
                    rewardHistory: store.rewardHistory.value
                };
                
                // 创建JSON文件
                const dataStr = JSON.stringify(allData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                
                // 创建下载链接
                const link = document.createElement('a');
                link.href = url;
                link.download = `habit-tracker-${new Date().toISOString().slice(0, 10)}.json`;
                link.style.display = 'none';
                
                // 添加到文档并触发点击
                document.body.appendChild(link);
                link.click();
                
                // 清理
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 100);
                
                store.showToast("数据导出成功！", 1500);
            };
            
            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        
                        // 确认导入
                        if (confirm("确定要导入数据吗？这会覆盖当前所有数据。")) {
                            // 导入所有数据
                            store.habits.value = importedData.habits || [];
                            store.rewards.value = importedData.rewards || [];
                            store.childName.value = importedData.childName || "小公主";
                            store.pageTitle.value = importedData.pageTitle || "习惯打卡";
                            store.dailyGoal.value = importedData.dailyGoal || 3;
                            store.dailyRecords.value = importedData.dailyRecords || {};
                            store.starHistory.value = importedData.starHistory || [];
                            store.ownedRewards.value = importedData.ownedRewards || [];
                            store.totalSpentStars.value = importedData.totalSpentStars || 0;
                            
                            // 导入礼物历史记录
                            if (importedData.rewardHistory) {
                                store.rewardHistory.value = importedData.rewardHistory;
                            }
                            
                            // 保存到localStorage
                            store.saveAll();
                            
                            // 刷新页面
                            window.location.reload();
                        }
                    } catch (error) {
                        store.showToast("数据导入失败，请检查文件格式。", 1500);
                    }
                };
                reader.readAsText(file);
                
                // 重置文件输入
                event.target.value = '';
            };

                if (!customReason.value.trim()) {
                    store.showToast("请输入事项原因", 1500);

                    store.showToast("星星数必须大于0", 1500);
                    return;
                }
                
                // 添加到历史记录
                const today = store.getTodayStr();

                    id: Date.now() + '_' + Math.random(),
                    date: today,
                    type: 'gain',
                    amount: customAmount.value,
                    reason: `额外奖励：${customReason.value.trim()}`

        }
    };
    
    const router = createRouter({
        history: createWebHashHistory(),
        routes: [
            { path: '/', component: HomePage },
            { path: '/profile', component: ProfilePage },
            { path: '/shop', component: ShopPage },
            { path: '/settings', component: SettingsPage }
        ]
    });
    
    const App = {
        setup() {
            const currentPath = ref(router.currentRoute.value.path);
            router.afterEach((to) => {
                currentPath.value = to.path;
            });
            const goTo = (path) => {
                router.push(path);
            };
            onMounted(() => {
                store.loadAll();
                currentPath.value = router.currentRoute.value.path;

            return { childName: store.childName, pageTitle: store.pageTitle, toastMsg: store.toastMsg, effects: store.effects, currentPath, goTo };
        },
        template: `
            <div class="app-container">
                <div class="princess-name-header">
                    <i class="fas fa-crown"></i> {{ childName }} 的 {{ pageTitle }} <i class="fas fa-star"></i>
                </div>
                <!-- 醒目导航按钮 -->
                <div class="nav-bar">
                    <button class="nav-btn" :class="{ active: currentPath === '/' }" @click="goTo('/')">
                        <i class="fas fa-home"></i> 首页
                    </button>
                    <button class="nav-btn" :class="{ active: currentPath === '/profile' }" @click="goTo('/profile')">
                        <i class="fas fa-user-circle"></i> 个人

                <router-view></router-view>
            </div>
            <div v-if="toastMsg" class="toast">{{ toastMsg }}</div>
            <div v-for="(effect, idx) in effects" :key="idx" class="star-effect" :style="{ left: effect.x + 'px', top: effect.y + 'px' }">{{ effect.emoji }}</div>
        `
    };
    
    const app = createApp(App);
    app.use(router);
    app.mount('#app');
</script>
